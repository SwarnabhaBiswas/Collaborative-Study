<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Sync - Pomodoro Collaborative Study App</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Sync is a real-time collaborative study platform with Pomodoro timer, live chat, and focus tracking. Study together, stay accountable, and boost productivity."
    />
    <meta
      name="keywords"
      content="pomodoro, study app, collaborative study, focus timer, group study, productivity app, sync study"
    />
    <meta name="author" content="Sync App" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Sync — Study Together, Stay Focused" />
    <meta
      property="og:description"
      content="Real-time study rooms with chat and Pomodoro timer. Build focus with Sync."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/preview.png" />

    <!-- Twitter (optional but good) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sync — Collaborative Study App" />
    <meta
      name="twitter:description"
      content="Study together using real-time chat and Pomodoro sessions."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#141414" />

    <!-- Fonts (optional upgrade) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Performance -->
    <link rel="preload" href="/src/main.jsx" as="script" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
